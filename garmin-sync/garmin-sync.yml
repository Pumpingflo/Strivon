name: Strivon → Garmin Workout Sync

on:
  workflow_dispatch:
    inputs:
      workouts_json:
        description: "Workouts as JSON array (sent by Strivon PWA)"
        required: true
        type: string

jobs:
  sync:
    name: Sync Workouts to Garmin Connect
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install garminconnect

      - name: Run Garmin sync
        env:
          GARMIN_EMAIL: ${{ secrets.GARMIN_EMAIL }}
          GARMIN_PASSWORD: ${{ secrets.GARMIN_PASSWORD }}
          WORKOUTS_JSON: ${{ inputs.workouts_json }}
        run: python sync.py
